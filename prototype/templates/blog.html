{% extends "base.html" %}

{% block content %}
<h1 class="title">
  {{ section.title }}
</h1>
<ul>
  <!-- If you are using pagination, section.pages will be empty.
       You need to use the paginator object -->  
{# Show subsections #}
{% for subsection in section.subsections %}
  {% set s = get_section(path=subsection) %}
  <h2><a href="{{ s.permalink }}">{{ s.title }}</a></h2>
  <p>{{ s.description | default(value="") }}</p>
{% endfor %}
</ul>
{% endblock content %}
